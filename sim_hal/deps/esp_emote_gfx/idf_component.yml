version: "3.0.5"
description: ESP Emote GFX - A lightweight UI graphics library for compact embedded displays.
url: https://github.com/espressif2022/esp_emote_gfx
repository: "https://github.com/espressif2022/esp_emote_gfx.git"
documentation: "https://espressif2022.github.io/esp_emote_gfx/en/index.html"
issues: "https://github.com/espressif2022/esp_emote_gfx/issues"
dependencies:
  cmake_utilities:
    version: 0.*
  idf:
    version: '>=5.0'
  espressif/freetype:
    version: "2.*"
  espressif/esp_new_jpeg:
    version: "1.*"
    public: true
  espressif/esp_lcd_touch:
    version: '>=1.0'
    public: true
  lvgl/lvgl:
    version: '*'
    public: true
  laride/heatshrink:
    version: '^0.4.1'
examples:
  - path: ./test_apps
